const {useState,useEffect,useCallback,useRef,useMemo,createElement:h,Fragment} = React;
const {LineChart,Line,BarChart,Bar,XAxis,YAxis,CartesianGrid,Tooltip,ResponsiveContainer,AreaChart,Area,ComposedChart,ReferenceLine} = Recharts;

// ── Constants ──
const MUSCLE_GROUPS=["Brust","Rücken","Schultern","Arme","Beine","Bauch","Ganzkörper"];
const FOOD_CATS=["Frühstück","Mittagessen","Abendessen","Snack"];
const BODY_PARTS=["Brust","Taille","Hüfte","Oberarm","Oberschenkel","Wade"];
const MOODS=["😄","😊","😐","😔","😫"];
const MOOD_LABELS=["Super","Gut","Ok","Schlecht","Erschöpft"];
const TEMPLATES=[
  {name:"Push Day",exercises:[{name:"Bankdrücken",group:"Brust",sets:"4",reps:"8",weight:""},{name:"Schulterdrücken",group:"Schultern",sets:"3",reps:"10",weight:""},{name:"Trizeps Pushdown",group:"Arme",sets:"3",reps:"12",weight:""}]},
  {name:"Pull Day",exercises:[{name:"Klimmzüge",group:"Rücken",sets:"4",reps:"8",weight:""},{name:"Rudern",group:"Rücken",sets:"3",reps:"10",weight:""},{name:"Bizeps Curls",group:"Arme",sets:"3",reps:"12",weight:""}]},
  {name:"Leg Day",exercises:[{name:"Kniebeugen",group:"Beine",sets:"4",reps:"8",weight:""},{name:"Beinpresse",group:"Beine",sets:"3",reps:"12",weight:""},{name:"Wadenheben",group:"Beine",sets:"4",reps:"15",weight:""}]},
];

// ── Storage helpers ──
function lsGet(k){try{const v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch{return null;}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}

// ── GPX/TCX ──
function haversine(la1,lo1,la2,lo2){const R=6371,dL=(la2-la1)*Math.PI/180,dO=(lo2-lo1)*Math.PI/180,a=Math.sin(dL/2)**2+Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dO/2)**2;return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));}
function parseGPX(xml){
  const doc=new DOMParser().parseFromString(xml,"application/xml");
  const pts=Array.from(doc.querySelectorAll("trkpt"));
  if(!pts.length)return null;
  let tot=0,hrT=0,hrN=0,kmD=0,kmS=null,kmHT=0,kmHN=0,prev=null;const splits=[];
  pts.forEach(p=>{
    const lat=parseFloat(p.getAttribute("lat")),lon=parseFloat(p.getAttribute("lon"));
    const tEl=p.querySelector("time"),hrEl=p.querySelector("hr")||p.querySelector("heartrate");
    const hr=hrEl?parseInt(hrEl.textContent):null,t=tEl?new Date(tEl.textContent):null;
    if(prev){const d=haversine(prev.lat,prev.lon,lat,lon);tot+=d;kmD+=d;
      if(hr&&hr>30&&hr<220){hrT+=hr;hrN++;kmHT+=hr;kmHN++;}
      if(kmD>=1){const el=t&&kmS?(t-kmS)/60000:null;splits.push({km:splits.length+1,time:el?el.toFixed(1):null,hr:kmHN>0?Math.round(kmHT/kmHN):null});kmD=0;kmS=t;kmHT=0;kmHN=0;}
      if(!kmS&&t)kmS=t;
    }else kmS=t;
    prev={lat,lon,time:t};
  });
  const f=pts[0].querySelector("time"),l=pts[pts.length-1].querySelector("time");
  return{dist:tot.toFixed(2),time:f&&l?((new Date(l.textContent)-new Date(f.textContent))/60000).toFixed(0):null,avgHR:hrN>0?Math.round(hrT/hrN):null,kmSplits:splits,date:f?new Date(f.textContent).toISOString().slice(0,10):new Date().toISOString().slice(0,10),note:"GPX Import"};
}
function parseTCX(xml){
  const doc=new DOMParser().parseFromString(xml,"application/xml");
  const pts=Array.from(doc.querySelectorAll("Trackpoint"));
  if(!pts.length)return null;
  let tot=0,hrT=0,hrN=0,kmD=0,kmS=null,kmHT=0,kmHN=0,prev=null;const splits=[];
  pts.forEach(p=>{
    const latEl=p.querySelector("LatitudeDegrees"),lonEl=p.querySelector("LongitudeDegrees"),tEl=p.querySelector("Time"),hrEl=p.querySelector("Value");
    const lat=latEl?parseFloat(latEl.textContent):null,lon=lonEl?parseFloat(lonEl.textContent):null;
    const hr=hrEl?parseInt(hrEl.textContent):null,t=tEl?new Date(tEl.textContent):null;
    if(hr&&!isNaN(hr)&&hr>30&&hr<220){hrT+=hr;hrN++;kmHT+=hr;kmHN++;}
    if(prev&&lat&&lon&&prev.lat&&prev.lon){const d=haversine(prev.lat,prev.lon,lat,lon);tot+=d;kmD+=d;
      if(kmD>=1){const el=t&&kmS?(t-kmS)/60000:null;splits.push({km:splits.length+1,time:el?el.toFixed(1):null,hr:kmHN>0?Math.round(kmHT/kmHN):null});kmD=0;kmS=t;kmHT=0;kmHN=0;}
      if(!kmS&&t)kmS=t;
    }else kmS=t;
    prev={lat,lon,time:t};
  });
  const f=pts[0].querySelector("Time"),l=pts[pts.length-1].querySelector("Time");
  return{dist:tot.toFixed(2),time:f&&l?((new Date(l.textContent)-new Date(f.textContent))/60000).toFixed(0):null,avgHR:hrN>0?Math.round(hrT/hrN):null,kmSplits:splits,date:f?new Date(f.textContent).toISOString().slice(0,10):new Date().toISOString().slice(0,10),note:"TCX Import"};
}

// ── UI helpers ──
function StatCard({icon,label,value,unit,color,sub}){
  return h('div',{style:{background:"rgba(255,255,255,0.04)",border:`1px solid ${color}33`,borderRadius:16,padding:"16px 18px",display:"flex",flexDirection:"column",gap:5,position:"relative",overflow:"hidden"}},
    h('div',{style:{position:"absolute",top:-6,right:-6,fontSize:52,opacity:0.06}},icon),
    h('span',{style:{fontSize:9,color:"#777",letterSpacing:"0.12em",textTransform:"uppercase"}},label),
    h('div',{style:{display:"flex",alignItems:"baseline",gap:4}},
      h('span',{style:{fontSize:26,fontFamily:"'Syne',sans-serif",fontWeight:800,color,lineHeight:1}},value),
      h('span',{style:{fontSize:11,color:"#555"}},unit)
    ),
    sub&&h('span',{style:{fontSize:9,color:"#555"}},sub)
  );
}
function EmptyState({icon,text}){
  return h('div',{style:{textAlign:"center",padding:"36px 24px",color:"#3a3a3a"}},
    h('div',{style:{fontSize:34,marginBottom:8}},icon),
    h('div',{style:{fontSize:11,letterSpacing:"0.1em"}},text)
  );
}
function ProgressBar({value,max,color,label,unit}){
  const pct=Math.min((value/max)*100,100);
  return h('div',{style:{marginBottom:8}},
    h('div',{style:{display:"flex",justifyContent:"space-between",marginBottom:5}},
      h('span',{style:{fontSize:10,color:"#888"}},label),
      h('span',{style:{fontSize:10,color}},`${value} / ${max} ${unit}`)
    ),
    h('div',{style:{background:"rgba(255,255,255,0.06)",borderRadius:999,height:6,overflow:"hidden"}},
      h('div',{style:{width:`${pct}%`,background:color,height:"100%",borderRadius:999,transition:"width 0.5s ease"}})
    )
  );
}
function SectionTitle({color,children}){
  return h('div',{style:{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:14,color,marginBottom:14,letterSpacing:"0.04em"}},children);
}
function Card({children,style}){
  return h('div',{style:{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:16,padding:18,...style}},children);
}

// ── Main App ──
function FitnessTracker(){
  const [tab,setTab]=useState(0);
  const [subTab,setSubTab]=useState(0);
  const [darkMode,setDarkMode]=useState(true);
  const [workouts,setWorkouts]=useState(()=>lsGet("ft_workouts")||[]);
  const [runs,setRuns]=useState(()=>lsGet("ft_runs")||[]);
  const [meals,setMeals]=useState(()=>lsGet("ft_meals")||[]);
  const [weights,setWeights]=useState(()=>lsGet("ft_weights")||[]);
  const [measurements,setMeasurements]=useState(()=>lsGet("ft_measurements")||[]);
  const [diary,setDiary]=useState(()=>lsGet("ft_diary")||[]);
  const [water,setWater]=useState(()=>lsGet("ft_water")||{});
  const [goals,setGoals]=useState(()=>lsGet("ft_goals")||{weeklyKm:20,dailyCal:2000,targetWeight:75,weeklyWorkouts:4});
  const [foodDB,setFoodDB]=useState(()=>lsGet("ft_fooddb")||[]);
  const [saving,setSaving]=useState(false);
  // forms
  const [wName,setWName]=useState("");const [wGroup,setWGroup]=useState(MUSCLE_GROUPS[0]);
  const [wSets,setWSets]=useState("");const [wReps,setWReps]=useState("");const [wKg,setWKg]=useState("");
  const [rDist,setRDist]=useState("");const [rTime,setRTime]=useState("");const [rHR,setRHR]=useState("");const [rNote,setRNote]=useState("");const [rKmSplits,setRKmSplits]=useState([]);
  const [wtVal,setWtVal]=useState("");const [wtNote,setWtNote]=useState("");
  const [measPart,setMeasPart]=useState(BODY_PARTS[0]);const [measVal,setMeasVal]=useState("");
  const [mName,setMName]=useState("");const [mCal,setMCal]=useState("");const [mProt,setMProt]=useState("");const [mCarb,setMCarb]=useState("");const [mFat,setMFat]=useState("");const [mCat,setMCat]=useState(FOOD_CATS[0]);
  const [dText,setDText]=useState("");const [dMood,setDMood]=useState(1);
  const [editGoals,setEditGoals]=useState(false);
  const [importMsg,setImportMsg]=useState(null);
  const [expandedRun,setExpandedRun]=useState(null);
  const [foodSearch,setFoodSearch]=useState("");
  const fileRef=useRef();

  const todayISO=new Date().toISOString().slice(0,10);
  const today=new Date().toLocaleDateString("de-DE");

  function sv(key,data){setSaving(true);lsSet(key,data);setTimeout(()=>setSaving(false),400);}

  const todayMeals=meals.filter(m=>m.date===todayISO);
  const todayCal=todayMeals.reduce((s,m)=>s+Number(m.cal),0);
  const todayProt=todayMeals.reduce((s,m)=>s+Number(m.prot||0),0);
  const todayWater=water[todayISO]||0;
  const weekRuns=runs.filter(r=>(new Date()-new Date(r.date))/86400000<=7);
  const weekKm=weekRuns.reduce((s,r)=>s+Number(r.dist),0);
  const weekWorkoutDays=new Set(workouts.filter(w=>(new Date()-new Date(w.date))/86400000<=7).map(w=>w.date)).size;
  const latestWeight=weights.length?Number(weights[weights.length-1].val):null;
  const todayWorkouts=workouts.filter(w=>w.date===todayISO);

  const streak=useMemo(()=>{
    const act=new Set([...workouts.map(w=>w.date),...runs.map(r=>r.date)]);
    let s=0,d=new Date();
    for(let i=0;i<365;i++){const iso=d.toISOString().slice(0,10);if(act.has(iso)){s++;d.setDate(d.getDate()-1);}else break;}
    return s;
  },[workouts,runs]);

  const pbs=useMemo(()=>{
    const lr=runs.reduce((b,r)=>!b||Number(r.dist)>Number(b.dist)?r:b,null);
    const fr=runs.reduce((b,r)=>r.dist>=5&&r.time&&(!b||r.time/r.dist<b.time/b.dist)?r:b,null);
    const mx={};workouts.forEach(w=>{if(w.weight&&Number(w.weight)>0)if(!mx[w.name]||Number(w.weight)>Number(mx[w.name].weight))mx[w.name]=w;});
    return{longestRun:lr,fastestRun:fr,maxByExercise:mx};
  },[workouts,runs]);

  const calChart=Array.from({length:7},(_,i)=>{const d=new Date();d.setDate(d.getDate()-(6-i));const iso=d.toISOString().slice(0,10);return{label:d.toLocaleDateString("de-DE",{weekday:"short"}),cal:meals.filter(m=>m.date===iso).reduce((s,m)=>s+Number(m.cal),0)};});
  const runChart=runs.slice(-10).map(r=>({label:new Date(r.date).toLocaleDateString("de-DE",{day:"2-digit",month:"2-digit"}),km:Number(r.dist),hr:r.avgHR||null}));
  const wtChart=weights.slice(-20).map(w=>({label:new Date(w.date).toLocaleDateString("de-DE",{day:"2-digit",month:"2-digit"}),kg:Number(w.val)}));

  // actions
  function addWorkout(tmpl){
    if(tmpl){const n=[...tmpl.exercises.map(e=>({id:Date.now()+Math.random(),date:todayISO,...e})),...workouts];setWorkouts(n);sv("ft_workouts",n);return;}
    if(!wName||!wSets||!wReps)return;
    const n=[{id:Date.now(),date:todayISO,name:wName,group:wGroup,sets:wSets,reps:wReps,weight:wKg},...workouts];
    setWorkouts(n);sv("ft_workouts",n);setWName("");setWSets("");setWReps("");setWKg("");
  }
  function delWorkout(id){const n=workouts.filter(w=>w.id!==id);setWorkouts(n);sv("ft_workouts",n);}
  function addRun(data){
    const e=data||{id:Date.now(),date:todayISO,dist:rDist,time:rTime,avgHR:rHR,note:rNote,kmSplits:rKmSplits.filter(s=>s.time||s.hr)};
    if(!e.id)e.id=Date.now();
    const n=[e,...runs];setRuns(n);sv("ft_runs",n);
    setRDist("");setRTime("");setRHR("");setRNote("");setRKmSplits([]);
  }
  function delRun(id){const n=runs.filter(r=>r.id!==id);setRuns(n);sv("ft_runs",n);}
  function updateKmSplits(dist){const km=Math.floor(Number(dist));if(km>0&&km<=100)setRKmSplits(Array.from({length:km},(_,i)=>rKmSplits[i]||{km:i+1,time:"",hr:""}));else setRKmSplits([]);}
  function addWeight(){if(!wtVal)return;const n=[...weights,{id:Date.now(),date:todayISO,val:wtVal,note:wtNote}];setWeights(n);sv("ft_weights",n);setWtVal("");setWtNote("");}
  function delWeight(id){const n=weights.filter(w=>w.id!==id);setWeights(n);sv("ft_weights",n);}
  function addMeasurement(){if(!measVal)return;const n=[...measurements,{id:Date.now(),date:todayISO,part:measPart,val:measVal}];setMeasurements(n);sv("ft_measurements",n);setMeasVal("");}
  function delMeasurement(id){const n=measurements.filter(m=>m.id!==id);setMeasurements(n);sv("ft_measurements",n);}
  function addMeal(pf){
    const name=pf?.name||mName,cal=pf?.cal||mCal,prot=pf?.prot||mProt,carb=pf?.carb||mCarb,fat=pf?.fat||mFat,cat=pf?.cat||mCat;
    if(!name||!cal)return;
    const n=[{id:Date.now(),date:todayISO,name,cal,prot,carb,fat,cat},...meals];setMeals(n);sv("ft_meals",n);
    setMName("");setMCal("");setMProt("");setMCarb("");setMFat("");
  }
  function delMeal(id){const n=meals.filter(m=>m.id!==id);setMeals(n);sv("ft_meals",n);}
  function saveFoodToDB(){if(!mName||!mCal)return;const n=[...foodDB,{id:Date.now(),name:mName,cal:mCal,prot:mProt,carb:mCarb,fat:mFat,cat:mCat}];setFoodDB(n);sv("ft_fooddb",n);}
  function delFood(id){const n=foodDB.filter(f=>f.id!==id);setFoodDB(n);sv("ft_fooddb",n);}
  function setWaterToday(n){const w={...water,[todayISO]:n};setWater(w);sv("ft_water",w);}
  function addDiary(){if(!dText.trim())return;const n=[{id:Date.now(),date:todayISO,text:dText,mood:dMood},...diary];setDiary(n);sv("ft_diary",n);setDText("");}
  function delDiary(id){const n=diary.filter(d=>d.id!==id);setDiary(n);sv("ft_diary",n);}
  function saveGoals(g){setGoals(g);sv("ft_goals",g);}

  async function handleImport(e){
    const file=e.target.files?.[0];if(!file)return;setImportMsg("Analysiere…");
    try{
      const text=await file.text();
      let p=file.name.toLowerCase().endsWith(".gpx")?parseGPX(text):parseTCX(text);
      if(!p){setImportMsg("❌ Fehler beim Lesen");return;}
      p.id=Date.now();addRun(p);setImportMsg(`✓ ${p.dist} km · ${p.time} min${p.avgHR?` · ⌀${p.avgHR} bpm`:""}`);
    }catch(err){setImportMsg("❌ "+err.message);}
    e.target.value="";setTimeout(()=>setImportMsg(null),5000);
  }

  function exportData(){
    const blob=new Blob([JSON.stringify({workouts,runs,meals,weights,measurements,diary,water,goals,foodDB},null,2)],{type:"application/json"});
    const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=`fittrack_${todayISO}.json`;a.click();
  }
  function exportCSV(type){
    let h2,rows;
    if(type==="runs"){h2=["Datum","km","min","HF","Notiz"];rows=runs.map(r=>[r.date,r.dist,r.time,r.avgHR||"",r.note||""]);}
    else if(type==="workouts"){h2=["Datum","Übung","Gruppe","Sätze","Wdh","kg"];rows=workouts.map(w=>[w.date,w.name,w.group,w.sets,w.reps,w.weight||""]);}
    else{h2=["Datum","kg","Notiz"];rows=weights.map(w=>[w.date,w.val,w.note||""]);}
    const blob=new Blob([[h2,...rows].map(r=>r.join(";")).join("\n")],{type:"text/csv"});
    const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=`fittrack_${type}_${todayISO}.csv`;a.click();
  }

  // styles
  const inp={background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:10,color:"#eee",padding:"10px 14px",fontSize:13,outline:"none",width:"100%",boxSizing:"border-box"};
  const lbl={fontSize:9,color:"#666",letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:4,display:"block"};
  const btnStyle=(g)=>({background:g,border:"none",borderRadius:10,color:"#111",fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:13,padding:"10px 18px",cursor:"pointer",width:"100%"});
  const cardS={background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:16,padding:18};
  const tt={background:"#1a1a1a",border:"1px solid #333",borderRadius:8,fontSize:11};
  const gt={fontSize:9,fill:"#555"};
  const gs="#1e1e1e";
  const tabs=[{icon:"▦",label:"Board",c:"#e8ff6b"},{icon:"◈",label:"Workout",c:"#e8ff6b"},{icon:"⟳",label:"Lauf",c:"#5ce8ff"},{icon:"⚖",label:"Körper",c:"#c084fc"},{icon:"◉",label:"Essen",c:"#ff7c5c"},{icon:"✎",label:"Mehr",c:"#a8e063"}];

  // ── render helpers ──
  function inp2(val,set,props={}){return h('input',{style:inp,value:val,onChange:e=>set(e.target.value),...props});}
  function sel(val,set,opts){return h('select',{style:inp,value:val,onChange:e=>set(e.target.value)},opts.map(o=>h('option',{key:o,value:o},o)));}
  function saveBtn(grad,onClick,label){return h('button',{style:btnStyle(grad),onClick},label);}

  // ── DASHBOARD ──
  function renderDashboard(){
    const wkAvgCal=Math.round(Array.from({length:7},(_,i)=>{const d=new Date();d.setDate(d.getDate()-(6-i));return meals.filter(m=>m.date===d.toISOString().slice(0,10)).reduce((s,m)=>s+Number(m.cal),0);}).reduce((a,b)=>a+b,0)/7);
    const wkAvgProt=Math.round(Array.from({length:7},(_,i)=>{const d=new Date();d.setDate(d.getDate()-(6-i));return meals.filter(m=>m.date===d.toISOString().slice(0,10)).reduce((s,m)=>s+Number(m.prot||0),0);}).reduce((a,b)=>a+b,0)/7);
    return h('div',{style:{display:"flex",flexDirection:"column",gap:14}},
      h('div',{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}},
        h('div',{style:{...cardS,background:"linear-gradient(135deg,rgba(232,255,107,0.12),rgba(168,224,99,0.06))",border:"1px solid rgba(232,255,107,0.2)",textAlign:"center",padding:"16px 12px"}},
          h('div',{style:{fontSize:32,fontFamily:"'Syne',sans-serif",fontWeight:800,color:"#e8ff6b",lineHeight:1}},streak),
          h('div',{style:{fontSize:9,color:"#555",letterSpacing:"0.1em",marginTop:4}},"TAGE STREAK 🔥")
        ),
        h('div',{style:{...cardS,textAlign:"center",padding:"16px 12px"}},
          h('div',{style:{fontSize:32,fontFamily:"'Syne',sans-serif",fontWeight:800,color:"#5ce8ff",lineHeight:1}},weekKm.toFixed(1)),
          h('div',{style:{fontSize:9,color:"#555",letterSpacing:"0.1em",marginTop:4}},"KM DIESE WOCHE")
        )
      ),
      h('div',{style:cardS},
        h('div',{style:{fontSize:9,color:"#555",letterSpacing:"0.14em",textTransform:"uppercase",marginBottom:12}},"Ziele dieser Woche"),
        h(ProgressBar,{value:weekKm.toFixed(1),max:goals.weeklyKm,color:"#5ce8ff",label:"Lauf-Ziel",unit:"km"}),
        h(ProgressBar,{value:weekWorkoutDays,max:goals.weeklyWorkouts,color:"#e8ff6b",label:"Trainingstage",unit:"Tage"}),
        h(ProgressBar,{value:todayCal,max:goals.dailyCal,color:"#ff7c5c",label:"Kalorien heute",unit:"kcal"}),

      ),
      foodDB.length>0&&h('div',{style:cardS},
        h(SectionTitle,{color:"#ff7c5c"},"🗃 Gespeicherte Lebensmittel"),
        h('input',{style:{...inp,marginBottom:10},placeholder:"Suchen…",value:foodSearch,onChange:e=>setFoodSearch(e.target.value)}),
        h('div',{style:{display:"flex",flexDirection:"column",gap:6}},
          foodDB.filter(f=>f.name.toLowerCase().includes(foodSearch.toLowerCase())).map(f=>h('div',{key:f.id,style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 10px",background:"rgba(255,255,255,0.03)",borderRadius:8}},
            h('div',null,h('span',{style:{fontSize:12,color:"#eee",fontFamily:"'Syne',sans-serif",fontWeight:700}},f.name),h('span',{style:{fontSize:10,color:"#555",marginLeft:8}},f.cal+" kcal")),
            h('div',{style:{display:"flex",gap:6}},
              h('button',{onClick:()=>addMeal(f),style:{background:"#ff7c5c",border:"none",borderRadius:6,color:"#111",fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:10,padding:"4px 8px",cursor:"pointer"}},"+ Hinzufügen"),
              h('button',{onClick:()=>delFood(f.id),style:{background:"none",border:"none",color:"#333",fontSize:16,cursor:"pointer"}},"×")
            )
          ))
        )
      ),
      h('div',{style:cardS},
        h(SectionTitle,{color:"#ff7c5c"},"+ Mahlzeit eintragen"),
        h('div',{style:{display:"flex",flexDirection:"column",gap:10}},
          h('div',{style:{display:"grid",gridTemplateColumns:"2fr 1fr",gap:8}},
            h('div',null,h('label',{style:lbl},"Lebensmittel"),inp2(mName,setMName,{placeholder:"z.B. Haferflocken"})),
            h('div',null,h('label',{style:lbl},"Kategorie"),sel(mCat,setMCat,FOOD_CATS))
          ),
          h('div',{style:{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6}},
            h('div',null,h('label',{style:lbl},"kcal"),inp2(mCal,setMCal,{type:"number",placeholder:"350"})),
            h('div',null,h('label',{style:lbl},"Prot"),inp2(mProt,setMProt,{type:"number",placeholder:"12"})),
            h('div',null,h('label',{style:lbl},"KH"),inp2(mCarb,setMCarb,{type:"number",placeholder:"55"})),
            h('div',null,h('label',{style:lbl},"Fett"),inp2(mFat,setMFat,{type:"number",placeholder:"8"}))
          ),
          h('div',{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}},
            saveBtn("linear-gradient(135deg,#ff7c5c,#ff4d2e)",()=>addMeal(),"Hinzufügen"),
            h('button',{onClick:saveFoodToDB,style:{...btnStyle("transparent"),border:"1px solid rgba(255,255,255,0.08)",color:"#eee",fontSize:11}},"💾 In DB speichern")
          )
        )
      ),
      h('div',{style:{fontSize:9,color:"#555",letterSpacing:"0.12em",textTransform:"uppercase",paddingLeft:4}},"Verlauf"),
      meals.length===0?h(EmptyState,{icon:"🥗",text:"Noch keine Mahlzeiten"}):
      meals.map(m=>h('div',{key:m.id,style:{...cardS,padding:"12px 14px",display:"flex",justifyContent:"space-between",alignItems:"center"}},
        h('div',null,
          h('div',{style:{display:"flex",gap:7,alignItems:"center"}},
            h('span',{style:{fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:13,color:"#ff7c5c"}},m.name),
            h('span',{style:{fontSize:8,color:"#555",background:"rgba(255,255,255,0.06)",padding:"2px 5px",borderRadius:4}},m.cat)
          ),
          h('div',{style:{fontSize:10,color:"#555",marginTop:2}},m.cal+" kcal"+(m.prot?" · P:"+m.prot+"g":"")+(m.carb?" · KH:"+m.carb+"g":"")+(m.fat?" · F:"+m.fat+"g":"")),
          h('div',{style:{fontSize:9,color:"#333",marginTop:2}},new Date(m.date).toLocaleDateString("de-DE"))
        ),
        h('button',{onClick:()=>delMeal(m.id),style:{background:"none",border:"none",color:"#333",fontSize:18,cursor:"pointer",padding:"4px 8px"}},"×")
      ))
    );
  }

  // ── MEHR ──
  function renderMehr(){
    return h('div',{style:{display:"flex",flexDirection:"column",gap:14}},
      h('div',{style:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6}},
        ["Tagebuch","Ziele","Export"].map((t,i)=>h('button',{key:t,onClick:()=>setSubTab(i),style:{background:subTab===i?"rgba(168,224,99,0.15)":"transparent",border:`1px solid ${subTab===i?"rgba(168,224,99,0.4)":"rgba(255,255,255,0.08)"}`,borderRadius:10,color:subTab===i?"#a8e063":"#555",fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:11,padding:"8px",cursor:"pointer"}},t))
      ),
      subTab===0&&h(Fragment,null,
        h('div',{style:cardS},
          h(SectionTitle,{color:"#a8e063"},"✎ Tageseintrag"),
          h('div',{style:{display:"flex",flexDirection:"column",gap:10}},
            h('div',null,
              h('label',{style:lbl},"Stimmung"),
              h('div',{style:{display:"flex",gap:10,marginTop:4}},
                MOODS.map((m,i)=>h('button',{key:i,onClick:()=>setDMood(i),style:{background:dMood===i?"rgba(168,224,99,0.2)":"transparent",border:`1px solid ${dMood===i?"rgba(168,224,99,0.4)":"rgba(255,255,255,0.08)"}`,borderRadius:8,padding:"6px 10px",cursor:"pointer",fontSize:18}},m))
              )
            ),
            h('div',null,h('label',{style:lbl},"Notiz"),h('textarea',{style:{...inp,minHeight:80,resize:"vertical"},value:dText,onChange:e=>setDText(e.target.value),placeholder:"Wie war dein Tag?"})),
            saveBtn("linear-gradient(135deg,#a8e063,#5a9e2a)",addDiary,"Speichern")
          )
        ),
        diary.length===0?h(EmptyState,{icon:"📖",text:"Noch keine Einträge"}):
        diary.map(d=>h('div',{key:d.id,style:{...cardS,padding:"12px 16px"}},
          h('div',{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}},
            h('div',{style:{display:"flex",gap:8,alignItems:"center",marginBottom:6}},h('span',{style:{fontSize:20}},MOODS[d.mood]),h('span',{style:{fontSize:9,color:"#555"}},MOOD_LABELS[d.mood]+" · "+new Date(d.date).toLocaleDateString("de-DE"))),
            h('button',{onClick:()=>delDiary(d.id),style:{background:"none",border:"none",color:"#333",fontSize:16,cursor:"pointer"}},"×")
          ),
          h('div',{style:{fontSize:12,color:"#eee",lineHeight:1.6,whiteSpace:"pre-wrap"}},d.text)
        ))
      ),
      subTab===1&&h('div',{style:cardS},
        h('div',{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}},
          h(SectionTitle,{color:"#a8e063"},"🎯 Ziele setzen"),
          h('button',{onClick:()=>setEditGoals(!editGoals),style:{background:editGoals?"rgba(168,224,99,0.2)":"transparent",border:"1px solid rgba(255,255,255,0.08)",borderRadius:8,color:"#a8e063",fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:10,padding:"5px 10px",cursor:"pointer"}},editGoals?"Fertig":"Bearbeiten")
        ),
        h('div',{style:{display:"flex",flexDirection:"column",gap:14}},
          [{key:"weeklyKm",label:"Wöchentliche km",unit:"km",color:"#5ce8ff",min:1,max:200},{key:"dailyCal",label:"Tägliche Kalorien",unit:"kcal",color:"#ff7c5c",min:500,max:5000},{key:"targetWeight",label:"Zielgewicht",unit:"kg",color:"#c084fc",min:30,max:200},{key:"weeklyWorkouts",label:"Trainingstage/Woche",unit:"Tage",color:"#e8ff6b",min:1,max:7}]
          .map(({key,label,unit,color,min,max})=>h('div',{key},
            h('div',{style:{display:"flex",justifyContent:"space-between",marginBottom:6}},
              h('span',{style:{fontSize:10,color:"#555"}},label),
              h('span',{style:{fontSize:12,color,fontWeight:700}},goals[key]+" "+unit)
            ),
            editGoals?h('input',{type:"range",min,max,value:goals[key],onChange:e=>saveGoals({...goals,[key]:Number(e.target.value)}),style:{width:"100%",accentColor:color}}):
            h('div',{style:{background:"rgba(255,255,255,0.06)",borderRadius:999,height:6}},h('div',{style:{width:`${Math.min(((goals[key]-min)/(max-min))*100,100)}%`,background:color,height:"100%",borderRadius:999}}))
          ))
        )
      ),
      subTab===2&&h('div',{style:{display:"flex",flexDirection:"column",gap:10}},
        h('div',{style:cardS},
          h(SectionTitle,{color:"#a8e063"},"📤 Daten exportieren"),
          h('div',{style:{display:"flex",flexDirection:"column",gap:8}},
            [{label:"Alle Daten (JSON Backup)",action:exportData,color:"linear-gradient(135deg,#a8e063,#5a9e2a)"},{label:"Läufe als CSV",action:()=>exportCSV("runs"),color:"linear-gradient(135deg,#5ce8ff,#0aa0c4)"},{label:"Workouts als CSV",action:()=>exportCSV("workouts"),color:"linear-gradient(135deg,#e8ff6b,#a8e063)"},{label:"Gewicht als CSV",action:()=>exportCSV("weights"),color:"linear-gradient(135deg,#c084fc,#7c3aed)"}]
            .map(({label,action,color})=>h('button',{key:label,style:btnStyle(color),onClick:action},label))
          )
        ),
        h('div',{style:{...cardS,padding:"14px 16px"}},
          h('div',{style:{fontSize:9,color:"#555",letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:12}},"Statistik"),
          [{label:"Workouts gesamt",val:workouts.length},{label:"Läufe gesamt",val:runs.length},{label:"Gesamt km",val:runs.reduce((s,r)=>s+Number(r.dist),0).toFixed(1)+" km"},{label:"Mahlzeiten",val:meals.length},{label:"Gewicht-Einträge",val:weights.length},{label:"Tagebuch-Einträge",val:diary.length}]
          .map(({label,val})=>h('div',{key:label,style:{display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:"1px solid rgba(255,255,255,0.06)"}},h('span',{style:{fontSize:11,color:"#555"}},label),h('span',{style:{fontSize:11,color:"#eee",fontFamily:"'Syne',sans-serif",fontWeight:700}},val)))
        )
      )
    );
  }

  return h('div',{style:{minHeight:"100vh",background:"#0d0d0d",color:"#eee",maxWidth:480,margin:"0 auto",paddingBottom:92}},
    // Header
    h('div',{style:{padding:"24px 20px 0",display:"flex",justifyContent:"space-between",alignItems:"flex-end"}},
      h('div',null,
        h('div',{style:{fontSize:9,color:"#555",letterSpacing:"0.16em",textTransform:"uppercase",marginBottom:2}},today),
        h('div',{style:{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:24,letterSpacing:"-0.02em",lineHeight:1}},"FIT",h('span',{style:{color:"#e8ff6b"}},"TRACK"))
      ),
      h('div',{style:{display:"flex",gap:10,alignItems:"center"}},
        saving&&h('div',{style:{fontSize:9,color:"#e8ff6b",letterSpacing:"0.1em"}},"●"),
        h('button',{onClick:()=>setDarkMode(!darkMode),style:{background:"none",border:"1px solid rgba(255,255,255,0.1)",borderRadius:8,color:"#eee",padding:"6px 10px",cursor:"pointer",fontSize:14}},"☀")
      )
    ),
    // Content
    h('div',{style:{padding:"16px 16px 0"}},
      tab===0&&renderDashboard(),
      tab===1&&renderWorkout(),
      tab===2&&renderLauf(),
      tab===3&&renderKoerper(),
      tab===4&&renderEssen(),
      tab===5&&renderMehr()
    ),
    // Nav
    h('div',{style:{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,background:"rgba(13,13,13,0.97)",backdropFilter:"blur(20px)",borderTop:"1px solid rgba(255,255,255,0.06)",display:"grid",gridTemplateColumns:"repeat(6,1fr)",padding:"10px 0 14px"}},
      tabs.map((item,i)=>h('button',{key:i,onClick:()=>{setTab(i);setSubTab(0);},style:{background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3,color:tab===i?item.c:"#333",transition:"color 0.2s"}},
        h('span',{style:{fontSize:16,lineHeight:1}},item.icon),
        h('span',{style:{fontSize:8,letterSpacing:"0.05em"}},item.label)
      ))
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(FitnessTracker));
</script>
</body>
</html>
